<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#3567dc,#1853b1);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Open Button */
.open-btn{
    padding:14px 30px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:#fff;
    border-radius:50px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 10px 30px rgba(6,182,212,.35);
    transition:.3s;
}

.open-btn:hover{
    transform:translateY(-3px);
}

/* Hide checkbox */
#modal-toggle{
    display:none;
}

/* Modal Background */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(35, 21, 227, 0.6);
    backdrop-filter:blur(8px);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;
    transition:.3s;
}

/* Show modal when checked */
#modal-toggle:checked + .modal{
    opacity:1;
    visibility:visible;
}

/* Modal Box */
.modal-box{
    width:380px;
    background:rgba(27, 65, 179, 0.08);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;
    text-align:center;
    color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    animation:pop .4s ease;
}

/* Animation */
@keyframes pop{
    from{
        transform:scale(.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.modal-box h2{
    margin-bottom:10px;
}

.modal-box p{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.6;
    margin-bottom:25px;
}

/* Buttons */
.actions{
    display:flex;
    justify-content:space-between;
    gap:15px;
}

.close-btn,
.primary-btn{
    flex:1;
    padding:12px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    text-align:center;
}

.close-btn{
    background:transparent;
    border:2px solid #38bdf8;
    color:#38bdf8;
}

.primary-btn{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:#fff;
}

.close-btn:hover,
.primary-btn:hover{
    transform:translateY(-3px);
}
</style>
<body>


<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Modal Trigger (CSS only trick) -->
<label for="modal-toggle" class="open-btn">Open Modal</label>

<input type="checkbox" id="modal-toggle">

<div class="modal">

    <div class="modal-box">

        <h2>Welcome 👋</h2>
        <p>
            This is a modern glassmorphism popup modal built with only HTML & CSS.
        </p>

        <div class="actions">
            <label for="modal-toggle" class="close-btn">Close</label>
            <a href="#" class="primary-btn">Continue</a>
        </div>

    </div>

</div>

</body>
</html>
    
</body>
</html>
